<style>

  html, body, #root { height: 100%; }
  body { margin: 0; font-family: 'Hanken Grotesk', system-ui, sans-serif; background: #f0f7fa; }
  input, textarea, button { font-family: inherit; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useReducer, useRef } = React;

const ACCENT = '#1b9aaa';
const AV_COLORS = ['#1b9aaa','#2f7f95','#3a8f7e','#4f6f99','#7a8db0','#5a93a8'];

function uid() { return 'id' + Math.random().toString(36).slice(2, 8); }
function initials(name) {
  const p = (name||'').trim().split(/\s+/);
  return ((p[0]||'')[0]||'').toUpperCase()+((p[1]||'')[0]||'').toUpperCase();
}
function formatDT(iso) {
  if (!iso) return 'Add a date';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const day = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let h = d.getHours(), m = d.getMinutes(), ap = h>=12?'PM':'AM';
  h = h%12||12;
  return day+' · '+h+':'+(m<10?'0'+m:m)+' '+ap;
}

const INITIAL = {
  tab:'todo', sheet:null, selectedAttendee:null, style:'airy',
  listName:'Coastal Wine Tasting',
  eventLocation:'The Vine Loft · 214 Harbor St',
  eventDateTime:'2026-07-18T19:00',
  eventNote:'A relaxed evening of coastal wines, cheese, and good company.',
  links:[
    {id:'l1',label:'Wine pairing guide',url:'vivino.com/pairings'},
    {id:'l2',label:'Evening playlist',url:'open.spotify.com/coastal'},
  ],
  attendees:[
    {id:'a1',name:'Maya Chen',rsvp:'going',plusOne:true,plusOneName:'Leo Park',note:'No shellfish'},
    {id:'a2',name:'Daniel Ortiz',rsvp:'going',plusOne:false,plusOneName:'',note:''},
    {id:'a3',name:'Priya Nair',rsvp:'maybe',plusOne:false,plusOneName:'',note:'Vegetarian'},
    {id:'a4',name:'Tom Becker',rsvp:'no',plusOne:false,plusOneName:'',note:''},
    {id:'a5',name:'Sofia Russo',rsvp:'going',plusOne:true,plusOneName:'',note:''},
  ],
  parties:[
    {id:'p2',listName:'Rooftop Birthday Bash',eventDateTime:'2026-06-06T20:00',eventLocation:'Sky Terrace, 9th floor',eventNote:"Cocktails and city views for Sam's 30th.",links:[],attendees:[{id:'b1',name:'Sam Lee',rsvp:'going',plusOne:false,plusOneName:'',note:''},{id:'b2',name:'Ava Diaz',rsvp:'going',plusOne:true,plusOneName:'',note:''},{id:'b3',name:'Noah Kim',rsvp:'maybe',plusOne:false,plusOneName:'',note:''}],sections:[]},
    {id:'p3',listName:'Summer Garden Brunch',eventDateTime:'2026-08-15T11:00',eventLocation:'The Greenhouse',eventNote:'Late-summer brunch in the garden.',links:[],attendees:[{id:'c1',name:'Ivy Chen',rsvp:'going',plusOne:false,plusOneName:'',note:''},{id:'c2',name:'Marc Roy',rsvp:'going',plusOne:false,plusOneName:'',note:''}],sections:[]},
    {id:'p4',listName:'Board Game Night',eventDateTime:'2026-05-22T19:30',eventLocation:'Our place',eventNote:'Snacks, strategy, and rivalries.',links:[],attendees:[{id:'d1',name:'Tess Vo',rsvp:'going',plusOne:false,plusOneName:'',note:''},{id:'d2',name:'Jon Park',rsvp:'no',plusOne:false,plusOneName:'',note:''},{id:'d3',name:'Mia Fox',rsvp:'going',plusOne:false,plusOneName:'',note:''},{id:'d4',name:'Leo Ray',rsvp:'maybe',plusOne:false,plusOneName:'',note:''}],sections:[]},
  ],
  sections:[
    {id:'sec_g',name:'Grocery list',groups:[
      {id:'g_ung',ungrouped:true,name:'',tasks:[
        {id:'t1',text:'Pinot Noir — 2 bottles',done:false},
        {id:'t2',text:'Cabernet Sauvignon',done:false},
        {id:'t4',text:'Sauvignon Blanc',done:false},
        {id:'t5',text:'Chardonnay',done:false},
        {id:'t6',text:'Prosecco — chilled',done:true},
        {id:'t7',text:'Aged gouda',done:false},
        {id:'t8',text:'Triple-cream brie',done:false},
        {id:'t9',text:'Dark chocolate (70%)',done:false},
        {id:'t10',text:'Marcona almonds',done:true},
      ]},
    ]},
    {id:'sec_d',name:'Decorations',groups:[
      {id:'d_table',name:'Tablescape',tasks:[
        {id:'t11',text:'Linen table runner',done:false},
        {id:'t12',text:'Tasting score cards',done:false},
        {id:'t13',text:'Wine charms',done:true},
      ]},
      {id:'d_amb',name:'Ambiance',tasks:[
        {id:'t14',text:'String lights',done:false},
        {id:'t15',text:'Beeswax candles',done:true},
        {id:'t16',text:'Fresh eucalyptus',done:false},
      ]},
    ]},
    {id:'sec_m',name:'Menu',groups:[
      {id:'m_app',name:'To start',tasks:[
        {id:'t17',text:'Charcuterie board',done:false},
        {id:'t18',text:'Whipped ricotta crostini',done:false},
      ]},
      {id:'m_main',name:'Plates',tasks:[{id:'t19',text:'Wild mushroom risotto',done:false}]},
      {id:'m_dess',name:'Sweet',tasks:[{id:'t20',text:'Berry pavlova',done:false}]},
    ]},
  ],
  drafts:{}, openAdd:{}, openAddItem:{}, itemDrafts:{}, openAddGroup:{}, groupDrafts:{},
  editingGroup:null, editingGroupName:'',
  editingSection:null, editingSectionName:'',
  editingTask:null, editingTaskText:'',
  newSectionDraft:'', addingSection:false,
  newListName:'', newAttendee:'', drag:null,
};

function reducer(state, action) {
  const patch = typeof action === 'function' ? action(state) : action;
  return {...state, ...patch};
}

const VARIANTS = {
  airy:{
    card:{background:'#ffffff',border:'1px solid #ecf3f6',borderRadius:'18px',boxShadow:'0 10px 26px -20px rgba(15,52,72,.35)',padding:'14px 15px 12px'},
    chip:{display:'inline-block',color:'#15788f',background:'#eaf6f8',borderRadius:'999px',padding:'4px 11px',fontWeight:700,fontSize:'10.5px',letterSpacing:'.07em',textTransform:'uppercase'},
  },
  minimal:{
    card:{background:'transparent',border:'none',borderRadius:'0',boxShadow:'none',padding:'2px 2px 14px',borderBottom:'1px solid #e7eef2'},
    chip:{display:'inline-block',color:'#6f93a2',background:'transparent',padding:'2px 0',fontWeight:700,fontSize:'10.5px',letterSpacing:'.16em',textTransform:'uppercase'},
  },
  bold:{
    card:{background:'#eef9fb',border:'1px solid #cdeaf0',borderRadius:'18px',boxShadow:'none',padding:'14px 15px 12px'},
    chip:{display:'inline-block',color:'#0c6478',background:'#bfe7ee',borderRadius:'8px',padding:'4px 11px',fontWeight:800,fontSize:'10.5px',letterSpacing:'.06em',textTransform:'uppercase'},
  },
};

const RSVP_META = {going:{l:'Going',c:ACCENT},maybe:{l:'Maybe',c:'#d8a13c'},no:{l:'No',c:'#cf7d6f'}};

function App() {
  const [s, dispatch] = useReducer(reducer, INITIAL);
  const set = (u) => dispatch(u);
  const dragRef = useRef(null);

  // — nav —
  const setTab = (t) => set({tab:t, sheet:null});
  const openSheet = (sh) => set({sheet:sh});
  const closeSheet = () => set({sheet:null, addingSection:false});

  // — tasks —
  const toggleTask = (sid,gid,tid) => set(s=>({sections:s.sections.map(sec=>sec.id!==sid?sec:{...sec,groups:sec.groups.map(g=>g.id!==gid?g:{...g,tasks:g.tasks.map(t=>t.id!==tid?t:{...t,done:!t.done})})})}));
  const removeTask = (sid,gid,tid) => set(s=>({sections:s.sections.map(sec=>sec.id!==sid?sec:{...sec,groups:sec.groups.map(g=>g.id!==gid?g:{...g,tasks:g.tasks.filter(t=>t.id!==tid)})})}));
  const setDraft = (gid,v) => set(s=>({drafts:{...s.drafts,[gid]:v}}));
  const toggleAdd = (gid) => set(s=>({openAdd:{...s.openAdd,[gid]:!s.openAdd[gid]}}));
  const addTask = (sid,gid) => set(s=>{
    const text=(s.drafts[gid]||'').trim(); if(!text) return {};
    return {sections:s.sections.map(sec=>sec.id!==sid?sec:{...sec,groups:sec.groups.map(g=>g.id!==gid?g:{...g,tasks:[...g.tasks,{id:uid(),text,done:false}]})}),drafts:{...s.drafts,[gid]:''}};
  });

  // — ungrouped + new group —
  const toggleNewItem = (sid) => set(s=>({openAddItem:{...s.openAddItem,[sid]:!s.openAddItem[sid]},openAddGroup:{...s.openAddGroup,[sid]:false}}));
  const setItemDraft = (sid,v) => set(s=>({itemDrafts:{...s.itemDrafts,[sid]:v}}));
  const addUngroupedItem = (sid) => set(s=>{
    const text=(s.itemDrafts[sid]||'').trim(); if(!text) return {};
    return {
      sections:s.sections.map(sec=>{
        if(sec.id!==sid) return sec;
        let groups=[...sec.groups];
        let ug=groups.find(g=>g.ungrouped);
        if(!ug){ug={id:uid(),ungrouped:true,name:'',tasks:[]};groups=[ug,...groups];}
        groups=groups.map(g=>g.id!==ug.id?g:{...g,tasks:[...g.tasks,{id:uid(),text,done:false}]});
        return {...sec,groups};
      }),
      itemDrafts:{...s.itemDrafts,[sid]:''},
    };
  });
  const toggleNewGroup = (sid) => set(s=>({openAddGroup:{...s.openAddGroup,[sid]:!s.openAddGroup[sid]},openAddItem:{...s.openAddItem,[sid]:false}}));
  const setGroupDraft = (sid,v) => set(s=>({groupDrafts:{...s.groupDrafts,[sid]:v}}));
  const addGroup = (sid) => set(s=>{
    const name=(s.groupDrafts[sid]||'').trim()||'New group';
    return {sections:s.sections.map(sec=>sec.id!==sid?sec:{...sec,groups:[...sec.groups,{id:uid(),name,tasks:[]}]}),groupDrafts:{...s.groupDrafts,[sid]:''},openAddGroup:{...s.openAddGroup,[sid]:false}};
  });

  // — rename group —
  const startRenameGroup = (sid,gid,name) => set({editingGroup:gid,editingGroupName:name});
  const commitRenameGroup = (sid,gid) => set(s=>{
    const name=(s.editingGroupName||'').trim();
    return {sections:name?s.sections.map(sec=>sec.id!==sid?sec:{...sec,groups:sec.groups.map(g=>g.id!==gid?g:{...g,name})}):s.sections,editingGroup:null,editingGroupName:''};
  });
  const cancelRenameGroup = () => set({editingGroup:null,editingGroupName:''});

  // — rename section —
  const startRenameSection = (sid,name) => set({editingSection:sid,editingSectionName:name});
  const commitRenameSection = (sid) => set(s=>{
    const name=(s.editingSectionName||'').trim();
    return {sections:name?s.sections.map(sec=>sec.id!==sid?sec:{...sec,name}):s.sections,editingSection:null,editingSectionName:''};
  });
  const cancelRenameSection = () => set({editingSection:null,editingSectionName:''});

  // — rename task —
  const startRenameTask = (tid,text) => set({editingTask:tid,editingTaskText:text});
  const commitRenameTask = (sid,gid,tid) => set(s=>{
    const text=(s.editingTaskText||'').trim();
    return {sections:text?s.sections.map(sec=>sec.id!==sid?sec:{...sec,groups:sec.groups.map(g=>g.id!==gid?g:{...g,tasks:g.tasks.map(t=>t.id!==tid?t:{...t,text})})}):s.sections,editingTask:null,editingTaskText:''};
  });
  const cancelRenameTask = () => set({editingTask:null,editingTaskText:''});

  // — sections —
  const startAddSection = () => set({addingSection:true});
  const addSection = () => set(s=>{
    const name=(s.newSectionDraft||'').trim(); if(!name) return {};
    return {sections:[...s.sections,{id:uid(),name,groups:[{id:uid(),name:'General',tasks:[]}]}],newSectionDraft:'',addingSection:false};
  });
  const moveSection = (sid,dir) => set(s=>{
    const arr=[...s.sections];
    const i=arr.findIndex(x=>x.id===sid), j=i+dir;
    if(i<0||j<0||j>=arr.length) return {};
    const [m]=arr.splice(i,1); arr.splice(j,0,m);
    return {sections:arr};
  });

  // — drag (pointer events — works on iOS Safari) —
  const reorderTask = (srcSid,srcGid,srcTid,tgtSid,tgtGid,tgtTid) => set(s=>{
    if(srcGid!==tgtGid||srcTid===tgtTid) return {};
    return {sections:s.sections.map(sec=>{
      if(sec.id!==srcSid) return sec;
      return {...sec,groups:sec.groups.map(g=>{
        if(g.id!==srcGid) return g;
        const arr=[...g.tasks];
        const from=arr.findIndex(t=>t.id===srcTid), to=arr.findIndex(t=>t.id===tgtTid);
        if(from<0||to<0) return g;
        const [m]=arr.splice(from,1); arr.splice(to,0,m);
        return {...g,tasks:arr};
      })};
    })};
  });
  const startPointerDrag = (e,sid,gid,tid) => {
    e.preventDefault();
    dragRef.current={sid,gid,tid,lastTarget:null};
    set({drag:{sid,gid,tid}});
    const onMove=(me)=>{
      const el=document.elementFromPoint(me.clientX,me.clientY);
      const row=el&&el.closest('[data-tid]');
      if(!row) return;
      const tTid=row.dataset.tid, d=dragRef.current;
      if(!d||tTid===d.lastTarget||tTid===d.tid) return;
      dragRef.current={...d,lastTarget:tTid};
      reorderTask(d.sid,d.gid,d.tid,row.dataset.sid,row.dataset.gid,tTid);
    };
    const onUp=()=>{
      document.removeEventListener('pointermove',onMove);
      document.removeEventListener('pointerup',onUp);
      document.removeEventListener('pointercancel',onUp);
      dragRef.current=null;
      set({drag:null});
    };
    document.addEventListener('pointermove',onMove);
    document.addEventListener('pointerup',onUp);
    document.addEventListener('pointercancel',onUp);
  };

  // — list management —
  const createNewList = () => set(s=>{
    const name=(s.newListName||'').trim()||'Untitled party';
    return {
      parties:[...s.parties,{id:uid(),listName:s.listName,eventDateTime:s.eventDateTime,eventLocation:s.eventLocation,eventNote:s.eventNote,links:s.links,attendees:s.attendees,sections:s.sections}],
      listName:name,newListName:'',sheet:null,tab:'todo',
      eventLocation:'Add a location',eventDateTime:'',eventNote:'Add a few words about the occasion.',
      links:[],attendees:[],
      sections:[{id:uid(),name:'Grocery list',groups:[]},{id:uid(),name:'Decorations',groups:[]},{id:uid(),name:'Menu',groups:[]}],
    };
  });
  const selectParty = (id) => {
    if(id==='__active'){set({sheet:null});return;}
    set(s=>{
      const target=s.parties.find(p=>p.id===id); if(!target) return {sheet:null};
      const snap={id:uid(),listName:s.listName,eventDateTime:s.eventDateTime,eventLocation:s.eventLocation,eventNote:s.eventNote,links:s.links,attendees:s.attendees,sections:s.sections};
      return {listName:target.listName,eventDateTime:target.eventDateTime,eventLocation:target.eventLocation||'Add a location',eventNote:target.eventNote||'',links:target.links||[],attendees:target.attendees||[],sections:target.sections||[],parties:[...s.parties.filter(p=>p.id!==id),snap],sheet:null,tab:'todo'};
    });
  };

  // — event —
  const setLink = (id,field,v) => set(s=>({links:s.links.map(l=>l.id!==id?l:{...l,[field]:v})}));
  const removeLink = (id) => set(s=>({links:s.links.filter(l=>l.id!==id)}));
  const addLink = () => set(s=>({links:[...s.links,{id:uid(),label:'',url:''}]}));

  // — attendees —
  const setRsvp = (id,v) => set(s=>({attendees:s.attendees.map(a=>a.id!==id?a:{...a,rsvp:v})}));
  const addAttendee = () => set(s=>{
    const name=(s.newAttendee||'').trim(); if(!name) return {};
    return {attendees:[...s.attendees,{id:uid(),name,rsvp:'going',plusOne:false,plusOneName:'',note:''}],newAttendee:''};
  });
  const removeAttendee = (id) => set(s=>({attendees:s.attendees.filter(a=>a.id!==id),sheet:'attendees'}));
  const togglePlusOne = (id) => set(s=>({attendees:s.attendees.map(a=>a.id!==id?a:{...a,plusOne:!a.plusOne})}));
  const setPlusOneName = (id,v) => set(s=>({attendees:s.attendees.map(a=>a.id!==id?a:{...a,plusOneName:v})}));
  const setAttendeeNote = (id,v) => set(s=>({attendees:s.attendees.map(a=>a.id!==id?a:{...a,note:v})}));

  // ——— computed ———
  const wantDone = s.tab==='done';
  const V = VARIANTS[s.style]||VARIANTS.airy;

  let total=0, doneCount=0;
  s.sections.forEach(sec=>sec.groups.forEach(g=>g.tasks.forEach(t=>{total++;if(t.done)doneCount++;})));
  const todoCount=total-doneCount, pct=total?Math.round(doneCount/total*100):0;

  const goingN=s.attendees.filter(a=>a.rsvp==='going').length;
  const guestN=s.attendees.filter(a=>a.plusOne).length;
  const attendeeSummary=s.attendees.length+' invited · '+goingN+' going'+(guestN?' · '+guestN+' +1':'');
  const links=s.links.map(l=>({...l,href:(l.url||'').startsWith('http')?l.url:'https://'+l.url}));

  const sel=s.attendees.find(a=>a.id===s.selectedAttendee);
  const selIdx=s.attendees.findIndex(a=>a.id===s.selectedAttendee);

  const activeSnap={id:'__active',listName:s.listName,eventDateTime:s.eventDateTime,count:s.attendees.length,active:true};
  const partyCards=[activeSnap,...s.parties.map(p=>({id:p.id,listName:p.listName,eventDateTime:p.eventDateTime,count:(p.attendees||[]).length,active:false}))].sort((a,b)=>(b.eventDateTime||'').localeCompare(a.eventDateTime||''));

  const sectionCount=s.sections.length;
  const builtSections=s.sections.map((sec,sidx)=>{
    const groups=sec.groups.map(g=>{
      const isUg=!!g.ungrouped;
      const tasks=g.tasks.filter(t=>t.done===wantDone);
      const visible=isUg?tasks.length>0:(wantDone?tasks.length>0:true);
      return visible?{...g,_tasks:tasks,_isUg:isUg}:null;
    }).filter(Boolean);
    const ordered=[...groups.filter(g=>g._isUg),...groups.filter(g=>!g._isUg)];
    let sd=0,st=0; sec.groups.forEach(g=>g.tasks.forEach(t=>{st++;if(t.done)sd++;}));
    return {...sec,_groups:ordered,_empty:ordered.length===0,_sd:sd,_st:st,_sidx:sidx};
  });
  const renderSections=wantDone?builtSections.filter(sec=>!sec._empty):builtSections;
  const isEmpty=wantDone&&renderSections.length===0;

  // styles
  const swBase={border:'none',borderRadius:'7px',padding:'5px 11px',fontSize:'11.5px',fontWeight:700,cursor:'pointer'};
  const sw=(on)=>on?{...swBase,background:'#fff',color:'#16384a',boxShadow:'0 1px 3px rgba(15,52,72,.14)'}:{...swBase,background:'transparent',color:'#8aa6b3'};
  const navBase={border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',position:'relative',padding:'6px 18px'};
  const badge=(on)=>({position:'absolute',top:'-2px',right:'4px',minWidth:'16px',height:'16px',borderRadius:'99px',background:on?ACCENT:'#b8cad3',color:'#fff',fontSize:'9.5px',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'});
  const caretBase={border:'1px solid #e3edf2',background:'#fff',borderRadius:'7px',width:'24px',height:'24px',fontSize:'8px',lineHeight:1,cursor:'pointer',color:'#6f93a2',display:'flex',alignItems:'center',justifyContent:'center',padding:0};
  const caretOff={...caretBase,color:'#d6e0e6',cursor:'default'};
  const segBase={flex:1,border:'1.5px solid',borderRadius:'11px',padding:'11px 4px',fontSize:'13px',fontWeight:700,cursor:'pointer'};
  const seg=(on,c)=>on?{...segBase,background:c,color:'#fff',borderColor:c}:{...segBase,background:'#fff',color:'#9fb6c1',borderColor:'#e6eef2'};

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#f0f7fa'}}>
      <div style={{position:'relative',flex:1,maxWidth:'680px',width:'100%',margin:'0 auto',background:'#fbfdfe',display:'flex',flexDirection:'column',boxShadow:'0 0 40px rgba(15,52,72,.08)'}}>


        {/* scroll area */}
        <div className="pp-scroll" style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'12px 24px 110px'}}>

          {/* top row */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0 14px'}}>
            <button onClick={()=>openSheet('parties')} style={{fontSize:'11px',fontWeight:600,letterSpacing:'.16em',textTransform:'uppercase',color:'#8aa6b3',border:'none',background:'transparent',padding:0,cursor:'pointer',display:'flex',alignItems:'center',gap:'5px'}}>
              Your parties <span style={{fontSize:'13px',letterSpacing:0}}>›</span>
            </button>
            <button onClick={()=>openSheet('newlist')} style={{border:'none',background:'#eaf6f8',color:'#15788f',fontWeight:600,fontSize:'12.5px',padding:'7px 13px',borderRadius:'999px',cursor:'pointer',display:'flex',alignItems:'center',gap:'5px'}}>
              <span style={{fontSize:'15px',lineHeight:1,marginTop:'-1px'}}>+</span> New list
            </button>
          </div>

          {/* event card */}
          <div style={{background:'#ffffff',border:'1px solid #eaf2f5',borderRadius:'24px',boxShadow:'0 14px 34px -20px rgba(15,52,72,.30)',padding:'22px 20px 18px',marginBottom:'22px'}}>
            <button onClick={()=>openSheet('rename')} style={{display:'block',textAlign:'left',border:'none',background:'transparent',padding:0,cursor:'pointer',width:'100%'}}>
              <span style={{fontSize:'11px',fontWeight:600,letterSpacing:'.16em',textTransform:'uppercase',color:ACCENT}}>Wine tasting</span>
              <h1 style={{fontFamily:"'Newsreader', Georgia, serif",fontWeight:500,fontSize:'31px',lineHeight:1.08,color:'#112f40',margin:'7px 0 0',letterSpacing:'-.01em'}}>
                {s.listName} <span style={{fontFamily:"'Hanken Grotesk', sans-serif",fontSize:'12px',fontWeight:600,color:'#b7c8d1',verticalAlign:'middle'}}>✎</span>
              </h1>
            </button>
            <p style={{fontFamily:"'Newsreader', Georgia, serif",fontStyle:'italic',fontSize:'15px',lineHeight:1.45,color:'#5f7c8a',margin:'11px 0 16px'}}>{s.eventNote}</p>
            <button onClick={()=>openSheet('event')} style={{display:'flex',gap:'22px',width:'100%',textAlign:'left',border:'none',background:'transparent',padding:'0 0 16px',cursor:'pointer',borderBottom:'1px solid #eef4f6'}}>
              <div>
                <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#9fb6c1',marginBottom:'4px'}}>Where</div>
                <div style={{fontSize:'13.5px',fontWeight:600,color:'#25485a',lineHeight:1.3}}>{s.eventLocation}</div>
              </div>
              <div>
                <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#9fb6c1',marginBottom:'4px'}}>When</div>
                <div style={{fontSize:'13.5px',fontWeight:600,color:'#25485a',lineHeight:1.3}}>{formatDT(s.eventDateTime)}</div>
              </div>
            </button>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px',padding:'14px 0 4px'}}>
              {links.map(lnk=>(
                <a key={lnk.id} href={lnk.href} target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:'6px',textDecoration:'none',background:'#f4f9fb',border:'1px solid #e6f0f4',color:'#3a6072',fontSize:'12px',fontWeight:600,padding:'6px 11px',borderRadius:'9px'}}>
                  <span style={{width:'5px',height:'5px',borderRadius:'50%',background:ACCENT}}/>{lnk.label} <span style={{color:'#b2c5cf'}}>↗</span>
                </a>
              ))}
            </div>
            <button onClick={()=>openSheet('attendees')} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',marginTop:'16px',padding:'12px 14px',borderRadius:'15px',border:'1px solid #e9f1f4',background:'#fafdfe',cursor:'pointer'}}>
              <div style={{display:'flex',alignItems:'center',gap:'11px'}}>
                <div style={{display:'flex'}}>
                  {s.attendees.slice(0,4).map((a,i)=>(
                    <div key={a.id} style={{width:'28px',height:'28px',borderRadius:'50%',background:AV_COLORS[i%AV_COLORS.length],color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,border:'2px solid #fff',marginLeft:i===0?'0':'-9px'}}>{initials(a.name)}</div>
                  ))}
                </div>
                <div style={{textAlign:'left'}}>
                  <div style={{fontSize:'13.5px',fontWeight:700,color:'#1f4254'}}>Attendees</div>
                  <div style={{fontSize:'11.5px',color:'#88a2af',fontWeight:500}}>{attendeeSummary}</div>
                </div>
              </div>
              <span style={{color:'#b7c8d1',fontSize:'20px',fontWeight:400}}>›</span>
            </button>
          </div>

          {/* progress + style switcher */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}}>
            <div style={{fontSize:'12px',fontWeight:600,color:'#5f7c8a'}}>{doneCount} of {total} done</div>
            <div style={{display:'flex',gap:0,background:'#eef4f7',borderRadius:'9px',padding:'3px'}}>
              <button onClick={()=>set({style:'airy'})} style={sw(s.style==='airy')}>Airy</button>
              <button onClick={()=>set({style:'minimal'})} style={sw(s.style==='minimal')}>Minimal</button>
              <button onClick={()=>set({style:'bold'})} style={sw(s.style==='bold')}>Bold</button>
            </div>
          </div>
          <div style={{height:'6px',borderRadius:'99px',background:'#e7eef2',overflow:'hidden',marginBottom:'24px'}}>
            <div style={{height:'100%',width:pct+'%',background:ACCENT,borderRadius:'99px',transition:'width .3s ease'}}/>
          </div>

          {/* sections */}
          {renderSections.map((sec)=>(
            <div key={sec.id} style={{marginBottom:'26px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px',gap:'10px'}}>
                <h2 style={{fontFamily:"'Newsreader', Georgia, serif",fontWeight:500,fontSize:'21px',color:'#16384a',margin:0,letterSpacing:'-.01em',minWidth:0,overflow:'hidden',flex:'0 1 auto'}}>
                  {s.editingSection===sec.id?(
                    <input value={s.editingSectionName} onChange={e=>set({editingSectionName:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')commitRenameSection(sec.id);if(e.key==='Escape')cancelRenameSection();}} onBlur={()=>commitRenameSection(sec.id)} autoFocus style={{font:'inherit',color:'inherit',width:'100%',border:'none',borderBottom:'1.5px solid '+ACCENT,background:'transparent',padding:'0 0 2px',outline:'none'}}/>
                  ):(
                    <button onClick={()=>startRenameSection(sec.id,sec.name)} style={{font:'inherit',color:'inherit',border:'none',background:'transparent',padding:0,cursor:'pointer',textAlign:'left',maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{sec.name}</button>
                  )}
                </h2>
                <div style={{display:'flex',alignItems:'center',gap:'9px',flex:'0 0 auto'}}>
                  <span style={{fontSize:'11px',fontWeight:600,color:'#a7bcc6'}}>{sec._sd}/{sec._st}</span>
                  <div style={{display:'flex',gap:'3px'}}>
                    <button onClick={()=>moveSection(sec.id,-1)} style={sec._sidx>0?caretBase:caretOff} title="Move up">▲</button>
                    <button onClick={()=>moveSection(sec.id,1)} style={sec._sidx<sectionCount-1?caretBase:caretOff} title="Move down">▼</button>
                  </div>
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
                {sec._groups.map(g=>{
                  const isUg=g._isUg, addOpen=!!s.openAdd[g.id], editing=s.editingGroup===g.id;
                  return (
                    <div key={g.id} style={V.card}>
                      {!isUg&&!editing&&<button onClick={()=>startRenameGroup(sec.id,g.id,g.name)} style={{...V.chip,border:'none',cursor:'pointer',fontFamily:'inherit'}}>{g.name}</button>}
                      {!isUg&&editing&&<input value={s.editingGroupName} onChange={e=>set({editingGroupName:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')commitRenameGroup(sec.id,g.id);if(e.key==='Escape')cancelRenameGroup();}} onBlur={()=>commitRenameGroup(sec.id,g.id)} autoFocus style={{...V.chip,background:'#fff',border:'1.5px solid '+ACCENT,cursor:'text',outline:'none',fontFamily:'inherit',maxWidth:'180px'}}/>}

                      <div style={{display:'flex',flexDirection:'column',gap:'2px',marginTop:'8px'}}>
                        {g._tasks.map(t=>(
                          <div key={t.id} data-tid={t.id} data-gid={g.id} data-sid={sec.id} className="task-row" style={{display:'flex',alignItems:'center',gap:'11px',padding:'7px 2px',borderRadius:'8px',opacity:s.drag&&s.drag.tid===t.id?0.4:1}}>
                            <div onClick={()=>toggleTask(sec.id,g.id,t.id)} style={{flex:'0 0 auto',width:'21px',height:'21px',borderRadius:'7px',border:t.done?'none':'2px solid #cddde4',background:t.done?ACCENT:'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                              {t.done&&<span style={{color:'#fff',fontSize:'12px',fontWeight:800,lineHeight:1}}>✓</span>}
                            </div>
                            {s.editingTask===t.id?(
                              <input value={s.editingTaskText} onChange={e=>set({editingTaskText:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')commitRenameTask(sec.id,g.id,t.id);if(e.key==='Escape')cancelRenameTask();}} onBlur={()=>commitRenameTask(sec.id,g.id,t.id)} autoFocus style={{flex:1,fontSize:'14.5px',fontWeight:500,color:'#274c5e',border:'none',borderBottom:'1.5px solid '+ACCENT,background:'transparent',padding:'2px 0',outline:'none',fontFamily:'inherit'}}/>
                            ):(
                              <span onClick={()=>startRenameTask(t.id,t.text)} style={{flex:1,fontSize:'14.5px',lineHeight:1.35,color:t.done?'#a7bcc6':'#274c5e',textDecoration:t.done?'line-through':'none',fontWeight:500,cursor:'text'}}>{t.text}</span>
                            )}
                            <button className="remove-btn" onClick={()=>removeTask(sec.id,g.id,t.id)} style={{border:'none',background:'transparent',color:'#cdd9e0',fontSize:'17px',lineHeight:1,cursor:'pointer',padding:'2px 4px',opacity:0,transition:'opacity .15s'}}>×</button>
                            <div onPointerDown={s.editingTask!==t.id?(e=>startPointerDrag(e,sec.id,g.id,t.id)):undefined} style={{display:'grid',gridTemplateColumns:'repeat(2, 3px)',gap:'3px',cursor:'grab',padding:'4px 2px',touchAction:'none',userSelect:'none'}}>
                              {[...Array(6)].map((_,i)=><div key={i} style={{width:'3px',height:'3px',borderRadius:'50%',background:'#c6d6de'}}/>)}
                            </div>
                          </div>
                        ))}
                      </div>

                      {!isUg&&!wantDone&&(addOpen?(
                        <div style={{display:'flex',gap:'7px',marginTop:'8px',alignItems:'center'}}>
                          <input value={s.drafts[g.id]||''} onChange={e=>setDraft(g.id,e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addTask(sec.id,g.id);}} placeholder="Add to this group…" autoFocus style={{flex:1,border:'none',borderBottom:'1.5px solid #d9e6ec',background:'transparent',padding:'6px 2px',fontSize:'14px',color:'#1f4254',outline:'none'}}/>
                          <button onClick={()=>addTask(sec.id,g.id)} style={{border:'none',background:ACCENT,color:'#fff',fontWeight:600,fontSize:'12.5px',padding:'7px 13px',borderRadius:'9px',cursor:'pointer'}}>Add</button>
                        </div>
                      ):(
                        <button onClick={()=>toggleAdd(g.id)} style={{border:'none',background:'transparent',color:'#9fb6c1',fontSize:'12.5px',fontWeight:600,cursor:'pointer',padding:'8px 2px 2px',display:'flex',alignItems:'center',gap:'6px'}}>
                          <span style={{fontSize:'15px',marginTop:'-1px'}}>+</span> Add item
                        </button>
                      ))}
                    </div>
                  );
                })}

                {/* section footer */}
                {!wantDone&&(
                  <div>
                    {s.openAddItem[sec.id]?(
                      <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
                        <input value={s.itemDrafts[sec.id]||''} onChange={e=>setItemDraft(sec.id,e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addUngroupedItem(sec.id);}} placeholder="New item…" autoFocus style={{flex:1,border:'1.5px solid #d9e6ec',borderRadius:'11px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none'}}/>
                        <button onClick={()=>addUngroupedItem(sec.id)} style={{border:'none',background:ACCENT,color:'#fff',fontWeight:600,fontSize:'13px',padding:'11px 15px',borderRadius:'11px',cursor:'pointer'}}>Add</button>
                      </div>
                    ):s.openAddGroup[sec.id]?(
                      <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
                        <input value={s.groupDrafts[sec.id]||''} onChange={e=>setGroupDraft(sec.id,e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addGroup(sec.id);}} placeholder="New group name…" autoFocus style={{flex:1,border:'1.5px solid #d9e6ec',borderRadius:'11px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none'}}/>
                        <button onClick={()=>addGroup(sec.id)} style={{border:'none',background:ACCENT,color:'#fff',fontWeight:600,fontSize:'13px',padding:'11px 15px',borderRadius:'11px',cursor:'pointer'}}>Create</button>
                      </div>
                    ):(
                      <div style={{display:'flex',gap:'8px'}}>
                        <button onClick={()=>toggleNewItem(sec.id)} style={{flex:1,border:'1.5px dashed #cfdee5',background:'transparent',color:'#6f93a2',fontWeight:600,fontSize:'13px',padding:'11px',borderRadius:'11px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}>
                          <span style={{fontSize:'15px',marginTop:'-1px'}}>+</span> New item
                        </button>
                        <button onClick={()=>toggleNewGroup(sec.id)} style={{flex:1,border:'1.5px dashed #cfdee5',background:'transparent',color:'#6f93a2',fontWeight:600,fontSize:'13px',padding:'11px',borderRadius:'11px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}>
                          <span style={{fontSize:'15px',marginTop:'-1px'}}>+</span> New group
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          ))}

          {/* empty state */}
          {isEmpty&&(
            <div style={{textAlign:'center',padding:'40px 20px',color:'#93acb8'}}>
              <div style={{fontFamily:"'Newsreader', Georgia, serif",fontStyle:'italic',fontSize:'19px',color:'#5f7c8a',marginBottom:'6px'}}>Nothing checked off yet</div>
              <div style={{fontSize:'13px'}}>Tick things off in the To-Do tab.</div>
            </div>
          )}

          {/* new section */}
          {s.addingSection?(
            <div style={{display:'flex',gap:'8px',alignItems:'center',marginTop:'6px'}}>
              <input value={s.newSectionDraft} onChange={e=>set({newSectionDraft:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')addSection();}} placeholder="Section name…" autoFocus style={{flex:1,border:'1.5px solid #d9e6ec',borderRadius:'11px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none'}}/>
              <button onClick={addSection} style={{border:'none',background:ACCENT,color:'#fff',fontWeight:600,fontSize:'13px',padding:'11px 15px',borderRadius:'11px',cursor:'pointer'}}>Add</button>
            </div>
          ):(
            <button onClick={startAddSection} style={{width:'100%',border:'1.5px dashed #cfdee5',background:'transparent',color:'#6f93a2',fontWeight:600,fontSize:'13.5px',padding:'14px',borderRadius:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px'}}>
              <span style={{fontSize:'17px',marginTop:'-1px'}}>+</span> New section
            </button>
          )}
        </div>

        {/* bottom nav */}
        <div style={{position:'sticky',bottom:0,height:'72px',padding:'0 40px 8px',display:'flex',alignItems:'center',justifyContent:'space-around',background:'linear-gradient(to top, #fbfdfe 70%, rgba(251,253,254,0))',zIndex:10}}>
          <button onClick={()=>setTab('todo')} style={{...navBase,color:s.tab==='todo'?ACCENT:'#9fb6c1'}}>
            <div style={{width:'19px',height:'19px',borderRadius:'6px',border:'2px solid currentColor',display:'flex',alignItems:'center',justifyContent:'center'}}/>
            <span style={{fontSize:'11px',fontWeight:700,letterSpacing:'.02em'}}>To-Do</span>
            <span style={badge(s.tab==='todo')}>{todoCount}</span>
          </button>
          <button onClick={()=>setTab('done')} style={{...navBase,color:s.tab==='done'?ACCENT:'#9fb6c1'}}>
            <div style={{width:'19px',height:'19px',borderRadius:'6px',border:'2px solid currentColor',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:900}}>✓</div>
            <span style={{fontSize:'11px',fontWeight:700,letterSpacing:'.02em'}}>Done</span>
            <span style={badge(s.tab==='done')}>{doneCount}</span>
          </button>
        </div>

        {/* ===== SHEETS ===== */}

        {s.sheet&&s.sheet!=='parties'&&(
          <div onClick={closeSheet} style={{position:'fixed',inset:0,background:'rgba(14,40,55,.34)',zIndex:20}}/>
        )}

        {/* Attendees */}
        {s.sheet==='attendees'&&(
          <div style={{position:'fixed',left:0,right:0,bottom:0,height:'78%',background:'#fbfdfe',borderRadius:'28px 28px 0 0',zIndex:21,display:'flex',flexDirection:'column',boxShadow:'0 -18px 50px -20px rgba(14,40,55,.4)'}}>
            <div style={{padding:'14px 22px 6px',display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{width:'38px',height:'4px',borderRadius:'99px',background:'#dde7ec',marginBottom:'16px'}}/>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%'}}>
                <div>
                  <h2 style={{fontFamily:"'Newsreader', serif",fontWeight:500,fontSize:'24px',color:'#16384a',margin:0}}>Attendees</h2>
                  <div style={{fontSize:'12px',color:'#88a2af',fontWeight:500,marginTop:'2px'}}>{attendeeSummary}</div>
                </div>
                <button onClick={closeSheet} style={{border:'none',background:'#eef4f7',color:'#5f7c8a',width:'30px',height:'30px',borderRadius:'50%',fontSize:'17px',cursor:'pointer'}}>×</button>
              </div>
            </div>
            <div className="pp-scroll" style={{flex:1,overflowY:'auto',padding:'12px 22px 16px'}}>
              <div style={{display:'flex',gap:'7px',marginBottom:'18px'}}>
                <input value={s.newAttendee} onChange={e=>set({newAttendee:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')addAttendee();}} placeholder="Add someone…" style={{flex:1,border:'1.5px solid #e1ebf0',borderRadius:'12px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none'}}/>
                <button onClick={addAttendee} style={{border:'none',background:ACCENT,color:'#fff',fontWeight:600,fontSize:'13px',padding:'0 16px',borderRadius:'12px',cursor:'pointer'}}>Invite</button>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                {s.attendees.map((a,i)=>(
                  <button key={a.id} onClick={()=>set({sheet:'contact',selectedAttendee:a.id})} style={{display:'flex',alignItems:'center',gap:'12px',padding:'11px 13px',border:'1px solid #eef4f6',borderRadius:'16px',background:'#fff',cursor:'pointer',textAlign:'left',width:'100%'}}>
                    <div style={{flex:'0 0 auto',width:'38px',height:'38px',borderRadius:'50%',background:AV_COLORS[i%AV_COLORS.length],color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700}}>{initials(a.name)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'14px',fontWeight:600,color:'#1f4254'}}>{a.name}</div>
                      {a.plusOne&&<div style={{fontSize:'11.5px',fontWeight:600,color:ACCENT,marginTop:'2px'}}>{a.plusOneName?'+1 · '+a.plusOneName:'+1 guest'}</div>}
                      {a.note&&a.note.trim()&&<div style={{fontSize:'11.5px',color:'#93acb8',marginTop:'2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'5px'}}><span style={{fontSize:'10px'}}>✎</span>{a.note.length>34?a.note.slice(0,34).trim()+'…':a.note}</div>}
                    </div>
                    <span style={{display:'inline-flex',alignItems:'center',fontSize:'11.5px',fontWeight:700,color:RSVP_META[a.rsvp].c,background:'#f5f9fb',borderRadius:'999px',padding:'5px 11px',flex:'0 0 auto'}}>{RSVP_META[a.rsvp].l}</span>
                    <span style={{color:'#c2d2da',fontSize:'19px'}}>›</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Contact detail */}
        {s.sheet==='contact'&&sel&&(
          <div style={{position:'fixed',left:0,right:0,bottom:0,maxHeight:'88%',background:'#fbfdfe',borderRadius:'28px 28px 0 0',zIndex:22,padding:'14px 22px 24px',boxShadow:'0 -18px 50px -20px rgba(14,40,55,.4)',display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
              <button onClick={()=>openSheet('attendees')} style={{border:'none',background:'#eef4f7',color:'#5f7c8a',width:'30px',height:'30px',borderRadius:'50%',fontSize:'19px',lineHeight:1,cursor:'pointer'}}>‹</button>
              <span style={{fontSize:'11px',fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#9fb6c1'}}>Contact</span>
              <button onClick={closeSheet} style={{border:'none',background:'#eef4f7',color:'#5f7c8a',width:'30px',height:'30px',borderRadius:'50%',fontSize:'17px',cursor:'pointer'}}>×</button>
            </div>
            <div className="pp-scroll" style={{overflowY:'auto'}}>
              <div style={{width:'64px',height:'64px',borderRadius:'50%',background:AV_COLORS[selIdx%AV_COLORS.length],color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',fontWeight:700,margin:'0 auto 10px'}}>{initials(sel.name)}</div>
              <h2 style={{fontFamily:"'Newsreader', serif",fontWeight:500,fontSize:'24px',color:'#16384a',margin:'0 0 20px',textAlign:'center'}}>{sel.name}</h2>
              <label style={{display:'block',fontSize:'11px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#9fb6c1',marginBottom:'8px'}}>RSVP</label>
              <div style={{display:'flex',gap:'7px',marginBottom:'20px'}}>
                <button onClick={()=>setRsvp(sel.id,'going')} style={seg(sel.rsvp==='going',ACCENT)}>Going</button>
                <button onClick={()=>setRsvp(sel.id,'maybe')} style={seg(sel.rsvp==='maybe','#d8a13c')}>Maybe</button>
                <button onClick={()=>setRsvp(sel.id,'no')} style={seg(sel.rsvp==='no','#cf7d6f')}>No</button>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 15px',border:'1px solid #eef4f6',borderRadius:'14px',background:'#fff',marginBottom:'12px'}}>
                <div>
                  <div style={{fontSize:'14px',fontWeight:700,color:'#1f4254'}}>Bringing a +1</div>
                  <div style={{fontSize:'12px',color:'#88a2af',marginTop:'1px'}}>A guest is joining them</div>
                </div>
                <div onClick={()=>togglePlusOne(sel.id)} style={{width:'46px',height:'27px',borderRadius:'99px',background:sel.plusOne?ACCENT:'#dbe6ec',position:'relative',cursor:'pointer',flex:'0 0 auto',transition:'background .2s'}}>
                  <div style={{position:'absolute',top:'3px',left:sel.plusOne?'22px':'3px',width:'21px',height:'21px',borderRadius:'50%',background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.25)',transition:'left .2s'}}/>
                </div>
              </div>
              {sel.plusOne&&<input value={sel.plusOneName||''} onChange={e=>setPlusOneName(sel.id,e.target.value)} placeholder="Guest's name (optional)" style={{width:'100%',border:'1.5px solid #e1ebf0',borderRadius:'12px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none',marginBottom:'16px'}}/>}
              <label style={{display:'block',fontSize:'11px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#9fb6c1',margin:'6px 0 8px'}}>Notes</label>
              <textarea value={sel.note||''} onChange={e=>setAttendeeNote(sel.id,e.target.value)} rows={2} placeholder="Dietary needs, plus-one details…" style={{width:'100%',border:'1.5px solid #e1ebf0',borderRadius:'12px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none',marginBottom:'18px',resize:'none',fontFamily:'inherit'}}/>
              <button onClick={()=>removeAttendee(sel.id)} style={{width:'100%',border:'1px solid #f0d9d4',background:'#fdf6f4',color:'#c2685f',fontWeight:600,fontSize:'13.5px',padding:'12px',borderRadius:'12px',cursor:'pointer'}}>Remove from list</button>
            </div>
          </div>
        )}

        {/* Rename */}
        {s.sheet==='rename'&&(
          <div style={{position:'fixed',left:0,right:0,bottom:0,background:'#fbfdfe',borderRadius:'28px 28px 0 0',zIndex:21,padding:'14px 22px 30px',boxShadow:'0 -18px 50px -20px rgba(14,40,55,.4)'}}>
            <div style={{width:'38px',height:'4px',borderRadius:'99px',background:'#dde7ec',margin:'0 auto 18px'}}/>
            <h2 style={{fontFamily:"'Newsreader', serif",fontWeight:500,fontSize:'23px',color:'#16384a',margin:'0 0 14px'}}>Rename list</h2>
            <input value={s.listName} onChange={e=>set({listName:e.target.value})} autoFocus style={{width:'100%',border:'1.5px solid #e1ebf0',borderRadius:'13px',background:'#fff',padding:'13px 14px',fontSize:'16px',fontWeight:600,color:'#1f4254',outline:'none',marginBottom:'16px'}}/>
            <button onClick={closeSheet} style={{width:'100%',border:'none',background:ACCENT,color:'#fff',fontWeight:700,fontSize:'15px',padding:'14px',borderRadius:'14px',cursor:'pointer'}}>Save</button>
          </div>
        )}

        {/* Event details */}
        {s.sheet==='event'&&(
          <div style={{position:'fixed',left:0,right:0,bottom:0,maxHeight:'86%',background:'#fbfdfe',borderRadius:'28px 28px 0 0',zIndex:21,padding:'14px 22px 28px',boxShadow:'0 -18px 50px -20px rgba(14,40,55,.4)',display:'flex',flexDirection:'column'}}>
            <div style={{width:'38px',height:'4px',borderRadius:'99px',background:'#dde7ec',margin:'0 auto 18px'}}/>
            <h2 style={{fontFamily:"'Newsreader', serif",fontWeight:500,fontSize:'23px',color:'#16384a',margin:'0 0 16px'}}>Event details</h2>
            <div className="pp-scroll" style={{overflowY:'auto'}}>
              <label style={{display:'block',fontSize:'11px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#9fb6c1',marginBottom:'6px'}}>Location</label>
              <input value={s.eventLocation} onChange={e=>set({eventLocation:e.target.value})} style={{width:'100%',border:'1.5px solid #e1ebf0',borderRadius:'12px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none',marginBottom:'16px'}}/>
              <label style={{display:'block',fontSize:'11px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#9fb6c1',marginBottom:'6px'}}>Date &amp; time</label>
              <input type="datetime-local" value={s.eventDateTime} onChange={e=>set({eventDateTime:e.target.value})} style={{width:'100%',border:'1.5px solid #e1ebf0',borderRadius:'12px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none',marginBottom:'16px',fontFamily:'inherit'}}/>
              <label style={{display:'block',fontSize:'11px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#9fb6c1',marginBottom:'6px'}}>Note</label>
              <textarea value={s.eventNote} onChange={e=>set({eventNote:e.target.value})} rows={2} style={{width:'100%',border:'1.5px solid #e1ebf0',borderRadius:'12px',background:'#fff',padding:'11px 13px',fontSize:'14px',color:'#1f4254',outline:'none',marginBottom:'16px',resize:'none',fontFamily:'inherit'}}/>
              <label style={{display:'block',fontSize:'11px',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#9fb6c1',marginBottom:'8px'}}>Links</label>
              <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'12px'}}>
                {s.links.map(l=>(
                  <div key={l.id} style={{display:'flex',gap:'7px',alignItems:'center'}}>
                    <input value={l.label} onChange={e=>setLink(l.id,'label',e.target.value)} placeholder="Label" style={{flex:1,border:'1.5px solid #e1ebf0',borderRadius:'10px',background:'#fff',padding:'9px 11px',fontSize:'13px',color:'#1f4254',outline:'none'}}/>
                    <input value={l.url} onChange={e=>setLink(l.id,'url',e.target.value)} placeholder="url" style={{flex:1,border:'1.5px solid #e1ebf0',borderRadius:'10px',background:'#fff',padding:'9px 11px',fontSize:'13px',color:'#6f93a2',outline:'none'}}/>
                    <button onClick={()=>removeLink(l.id)} style={{border:'none',background:'transparent',color:'#cdd9e0',fontSize:'18px',cursor:'pointer'}}>×</button>
                  </div>
                ))}
              </div>
              <button onClick={addLink} style={{border:'none',background:'transparent',color:'#6f93a2',fontWeight:600,fontSize:'13px',cursor:'pointer',padding:'2px 0 18px'}}>+ Add link</button>
            </div>
            <button onClick={closeSheet} style={{width:'100%',border:'none',background:ACCENT,color:'#fff',fontWeight:700,fontSize:'15px',padding:'14px',borderRadius:'14px',cursor:'pointer',flex:'0 0 auto'}}>Done</button>
          </div>
        )}

        {/* Your Parties */}
        {s.sheet==='parties'&&(
          <div style={{position:'fixed',inset:0,background:'#fbfdfe',zIndex:23,display:'flex',flexDirection:'column'}}>
            <div style={{padding:'52px 22px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <h2 style={{fontFamily:"'Newsreader', serif",fontWeight:500,fontSize:'27px',color:'#16384a',margin:0}}>Your parties</h2>
              <button onClick={closeSheet} style={{border:'none',background:'#eef4f7',color:'#5f7c8a',width:'32px',height:'32px',borderRadius:'50%',fontSize:'18px',cursor:'pointer'}}>×</button>
            </div>
            <div className="pp-scroll" style={{flex:1,overflowY:'auto',padding:'6px 22px 28px',display:'flex',flexDirection:'column',gap:'12px'}}>
              {partyCards.map(p=>(
                <button key={p.id} onClick={()=>selectParty(p.id)} style={{display:'block',width:'100%',textAlign:'left',background:'#fff',border:'1px solid '+(p.active?ACCENT:'#eaf2f5'),borderRadius:'18px',boxShadow:'0 10px 26px -20px rgba(15,52,72,.35)',padding:'16px 17px',cursor:'pointer'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'10px'}}>
                    <span style={{fontFamily:"'Newsreader', serif",fontWeight:500,fontSize:'20px',color:'#16384a'}}>{p.listName}</span>
                    {p.active&&<span style={{fontSize:'9.5px',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'#fff',background:ACCENT,padding:'4px 9px',borderRadius:'999px',flex:'0 0 auto'}}>Current</span>}
                  </div>
                  <div style={{fontSize:'13px',color:'#5f7c8a',fontWeight:600,marginTop:'9px'}}>{formatDT(p.eventDateTime)}</div>
                  <div style={{fontSize:'12.5px',color:'#88a2af',marginTop:'3px'}}>{p.count} {p.count===1?'guest':'guests'}</div>
                </button>
              ))}
              <button onClick={()=>openSheet('newlist')} style={{border:'1.5px dashed #cfdee5',background:'transparent',color:'#6f93a2',fontWeight:600,fontSize:'13.5px',padding:'14px',borderRadius:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',marginTop:'4px'}}>
                <span style={{fontSize:'17px',marginTop:'-1px'}}>+</span> New party
              </button>
            </div>
          </div>
        )}

        {/* New list */}
        {s.sheet==='newlist'&&(
          <div style={{position:'fixed',left:0,right:0,bottom:0,background:'#fbfdfe',borderRadius:'28px 28px 0 0',zIndex:21,padding:'14px 22px 28px',boxShadow:'0 -18px 50px -20px rgba(14,40,55,.4)'}}>
            <div style={{width:'38px',height:'4px',borderRadius:'99px',background:'#dde7ec',margin:'0 auto 18px'}}/>
            <span style={{fontSize:'11px',fontWeight:600,letterSpacing:'.16em',textTransform:'uppercase',color:ACCENT}}>Start fresh</span>
            <h2 style={{fontFamily:"'Newsreader', serif",fontWeight:500,fontSize:'23px',color:'#16384a',margin:'6px 0 16px'}}>New party list</h2>
            <input value={s.newListName} onChange={e=>set({newListName:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')createNewList();}} placeholder="e.g. Summer rooftop dinner" autoFocus style={{width:'100%',border:'1.5px solid #e1ebf0',borderRadius:'13px',background:'#fff',padding:'13px 14px',fontSize:'16px',fontWeight:600,color:'#1f4254',outline:'none',marginBottom:'10px'}}/>
            <p style={{fontSize:'12.5px',color:'#88a2af',margin:'0 0 18px',lineHeight:1.5}}>We'll set you up with Grocery list, Decorations and Menu sections to start.</p>
            <button onClick={createNewList} style={{width:'100%',border:'none',background:ACCENT,color:'#fff',fontWeight:700,fontSize:'15px',padding:'14px',borderRadius:'14px',cursor:'pointer'}}>Create list</button>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
